<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Quality Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="header">
      <div class="logo"><img src="img/sakura1.png" /></div>
      <div class="header-title">
        <h1 id="headerSlider">SAFETY DELIVERY REPORT</h1>
      </div>
      <div class="header-right">
        <div class="live-indicator">
          <span class="dot"></span> LIVE MONITORING
        </div>
        <div class="account-icon" title="Profile">
          <svg
            width="32"
            height="32"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#fff"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            xmlns="http://www.w3.org/2000/svg"
          >
            <circle cx="12" cy="8" r="4" />
            <path d="M4 20c0-2.5 3.5-4.5 8-4.5s8 2 8 4.5" />
          </svg>
        </div>
      </div>
    </div>

    <div class="main-content">
      <div class="vehicle-info-card">
        <div class="platno">
          <span class="label">Plat No</span>
          <span class="value">B 1234 XYZ</span>
          <span class="desc">Status Kendaraan Hari Ini</span>
        </div>
        <div
          class="status-cards"
          style="
            flex: 2;
            gap: 18px;
            margin-bottom: 0;
            justify-content: flex-end;
          "
        >
          <div class="card-status ok">
            <div class="icon">
              <svg
                width="28"
                height="28"
                viewBox="0 0 24 24"
                fill="none"
                stroke="#2ecc71"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                xmlns="http://www.w3.org/2000/svg"
              >
                <circle cx="12" cy="12" r="10" fill="none" />
                <path d="M8 12l3 3l5-5" fill="none" />
              </svg>
            </div>
            <div class="info">
              <span class="label">OK</span>
              <span class="value" id="okCount">0</span>
              <!-- <span class="desc">Feb 1 - Feb 6, ID</span>
              <span class="since" id="okSince">+22%</span> -->
            </div>
          </div>
          <div class="card-status ng">
            <div class="icon">
              <svg
                width="28"
                height="28"
                viewBox="0 0 24 24"
                fill="none"
                stroke="#e74c3c"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                xmlns="http://www.w3.org/2000/svg"
              >
                <circle cx="12" cy="12" r="10" fill="none" />
                <path d="M15 9l-6 6M9 9l6 6" fill="none" />
              </svg>
            </div>
            <div class="info">
              <span class="label">NG</span>
              <span class="value" id="ngCount">0</span>
              <!-- <span class="desc">Feb 1 - Feb 6, ID</span>
              <span class="since" id="ngSince">-2%</span> -->
            </div>
          </div>
          <div class="card-status unknown">
            <div class="icon">
              <svg
                width="28"
                height="28"
                viewBox="0 0 24 24"
                fill="none"
                stroke="#f1c40f"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                xmlns="http://www.w3.org/2000/svg"
              >
                <circle cx="12" cy="12" r="10" fill="none" />
                <path d="M12 16h.01" />
                <path d="M12 12a2 2 0 1 0-2-2" />
              </svg>
            </div>
            <div class="info">
              <span class="label">?</span>
              <span class="value" id="unknownCount">0</span>
              <!-- <span class="desc">Feb 1 - Feb 6, ID</span>
              <span class="since" id="unknownSince">+4%</span> -->
            </div>
          </div>
        </div>
      </div>

      <!-- CHART -->
      <div class="dashboard">
        <div id="lineChart"></div>
        <div
          id="pieChart"
          style="
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
          "
        >
          <div
            style="
              font-size: 1.1rem;
              font-weight: 600;
              margin-bottom: 8px;
              color: #444;
              align-self: flex-start;
            "
          >
            Chart Status Harian
          </div>
          <div id="pieChartInner" style="width: 100%"></div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
