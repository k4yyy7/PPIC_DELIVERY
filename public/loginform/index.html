<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - SAKURA</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Image Background -->
    <div class="image-background"></div>

    <!-- Login Container -->
    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <h2><i class="fas fa-cherry-blossom"></i> PT SAKURA JAVA INDONESIA</h2>
          <p>Welcome back! Please login to your account</p>
        </div>

        <!-- Body -->
        <div class="login-body">
          <!-- Success Message -->
          <div class="success-message" id="successMessage">
            <i class="fas fa-check-circle"></i> Login berhasil! Selamat datang
            kembali.
          </div>

          <form id="loginForm">
            <!-- Email / Plate Field -->
            <div class="form-group">
              <label for="identifier" class="form-label">Email atau Plat Nomor</label>
              <div class="input-group-custom">
                <i class="fas fa-envelope"></i>
                <input
                  id="identifier"
                  type="text"
                  class="form-control-custom"
                  name="identifier"
                  required
                  autocomplete="username"
                  autofocus
                  placeholder="Masukkan email atau plat nomor"
                />
              </div>
            </div>

            <!-- Password Field -->
            <div class="form-group">
              <label for="password" class="form-label">Password</label>
              <div class="input-group-custom">
                <input
                  id="password"
                  type="password"
                  class="form-control-custom"
                  name="password"
                  required
                  placeholder="Enter your password"
                />
                <i class="fas fa-eye toggle-password" id="togglePassword"></i>
              </div>
            </div>

            <!-- Remember Me -->
            <div class="form-check">
              <input
                class="form-check-input"
                type="checkbox"
                name="remember"
                id="remember"
              />
              <label class="form-check-label" for="remember">
                Remember Me
              </label>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn-login">
              <i class="fas fa-sign-in-alt"></i> Login
            </button>

            <!-- Forgot Password -->
            <div class="forgot-password">
              <a
                href="#"
                onclick="alert('Reset password feature coming soon!'); return false;"
              >
                <i class="fas fa-question-circle"></i> Forgot Your Password?
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
